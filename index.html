<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="shell">

  <div class="topbar glass">
    <div class="brand">
      <div class="dot"></div>
      <span>COMPASS</span>
    </div>

    <div class="controls">
      <input id="addressInput" type="text" placeholder="Enter address or place">
      <button id="goButton">Navigate</button>
      <button id="sensorButton" class="secondary">Enable Compass</button>
    </div>
  </div>

  <div class="main">

    <div class="compass-panel glass">

      <div class="compass-wrap">

        <img src="tick_ring_180_square.svg" class="ring">

        <div id="cardinalLayer" class="cardinal-layer">

          <div class="cardinal north">
            <img src="Compass Indicator.svg">
            <span>N</span>
          </div>

          <div class="cardinal east">
            <img src="Compass Indicator.svg">
            <span>E</span>
          </div>

          <div class="cardinal south">
            <img src="Compass Indicator.svg">
            <span>S</span>
          </div>

          <div class="cardinal west">
            <img src="Compass Indicator.svg">
            <span>W</span>
          </div>

        </div>

        <img id="arrow" src="Black Arrow.png" class="arrow">

        <div class="center-glow"></div>

      </div>

    </div>

    <div class="side glass">

      <div class="card">
        <div class="label">STATUS</div>
        <div id="status" class="value">Waiting for destination</div>
      </div>

      <div class="card">
        <div class="label">DISTANCE</div>
        <div id="distance" class="value">--</div>
      </div>

      <div class="card">
        <div class="label">TARGET BEARING</div>
        <div id="bearing" class="value">--</div>
      </div>

      <div class="card">
        <div class="label">PHONE HEADING</div>
        <div id="heading" class="value">--</div>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
